name: Keep Supabase Alive

# Runs automatically every 5 days at midnight UTC
# This prevents Supabase free tier from pausing due to inactivity

on:
  schedule:
    - cron: '0 0 */5 * *'   # Every 5 days at midnight UTC
  workflow_dispatch:          # Also allows manual trigger from GitHub

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    name: Ping Supabase to prevent pause

    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase project to keep it alive..."

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/menu_categories?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")

          echo "HTTP Response Code: $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Supabase is alive and responding!"
          else
            echo "⚠️ Unexpected response: $RESPONSE — check your secrets"
            exit 1
          fi
